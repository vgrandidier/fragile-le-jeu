<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAGILE - Livret de Règles Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --fragile-red: #D20604;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: #111827;
        }

        .bg-fragile-red { background-color: var(--fragile-red); }
        .text-fragile-red { color: var(--fragile-red); }
        .border-fragile-red { border-color: var(--fragile-red); }

        .conteneur {
            display: flex;
            align-items: center; /* Aligne verticalement au centre */
            gap: 10px; /* Espace entre le cercle et le texte */
        }
        .cercle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #111111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
        }

        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-bg {
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Style pour les onglets actifs */
        .tab-active {
            color: var(--fragile-red);
            border-bottom: 4px solid var(--fragile-red);
            background-color: rgba(210, 6, 4, 0.05);
        }
    </style>
</head>
<body class="overflow-hidden">

    <!-- MODAL ZOOM PLEIN ÉCRAN -->
    <div id="imageModal" class="fixed inset-0 z-[100] hidden modal-bg flex flex-col items-center justify-center p-2 md:p-4" onclick="closeModal()">
        <button class="absolute top-4 right-4 md:top-8 md:right-8 text-white/50 hover:text-white transition-colors z-[110] p-2 bg-white/10 rounded-full">
            <i data-lucide="x" class="w-8 h-8 md:w-10 md:h-10"></i>
        </button>
        <button id="prevBtn" onclick="event.stopPropagation(); navigateGallery(-1)" class="absolute left-2 md:left-8 top-1/2 -translate-y-1/2 text-white/30 hover:text-white hover:bg-white/10 p-2 md:p-4 rounded-full transition-all hidden z-[110]">
            <i data-lucide="chevron-left" class="w-10 h-10 md:w-16 md:h-16"></i>
        </button>
        <div class="relative w-full h-full flex items-center justify-center" onclick="event.stopPropagation()">
            <img id="modalImg" src="" alt="Zoom" class="max-w-full max-h-full object-contain shadow-2xl animate-fade-in select-none">
            <div id="modalPlaceholder" class="hidden flex flex-col items-center justify-center text-gray-500 p-10 text-center italic">
                <i data-lucide="image" class="w-20 h-20 mb-4 opacity-20"></i>
                <p id="modalDescText" class="text-white font-bold"></p>
            </div>
        </div>
        <button id="nextBtn" onclick="event.stopPropagation(); navigateGallery(1)" class="absolute right-2 md:right-8 top-1/2 -translate-y-1/2 text-white/30 hover:text-white hover:bg-white/10 p-2 md:p-4 rounded-full transition-all hidden z-[110]">
            <i data-lucide="chevron-right" class="w-10 h-10 md:w-16 md:h-16"></i>
        </button>
        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-6 flex flex-col md:flex-row justify-between items-center gap-4 pointer-events-none text-center md:text-left">
            <div>
                <p id="modalTitle" class="text-white font-black uppercase tracking-widest text-sm md:text-lg italic"></p>
                <p class="text-white/40 text-[10px] uppercase font-bold tracking-widest mt-1">Livret FRAGILE V4.0</p>
            </div>
            <span id="galleryCounter" class="bg-fragile-red text-white px-6 py-2 rounded-full font-black text-xs hidden shadow-lg"></span>
        </div>
    </div>

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-80 bg-gray-900 border-r-8 border-fragile-red sidebar-transition -translate-x-full md:translate-x-0 md:relative flex flex-col">
            <div class="p-10 text-center md:text-left">
                <h1 class="text-4xl font-black italic uppercase text-white tracking-tighter">
                    FRA<span class="text-fragile-red">GI</span>LE
                </h1>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em] mt-2">Maîtrisez le chaos de l'entrepôt</p>
            </div>

            <nav class="flex-1 px-6 space-y-2 overflow-y-auto no-scrollbar">
                <button onclick="loadPage('intro')" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold uppercase text-xs tracking-widest" data-page="intro">
                    <i data-lucide="truck" class="w-5 h-5"></i> Bienvenue
                </button>
                <button onclick="loadPage('materiel')" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold uppercase text-xs tracking-widest" data-page="materiel">
                    <i data-lucide="package" class="w-5 h-5"></i> Matériel
                </button>
                <button onclick="loadPage('setup')" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold uppercase text-xs tracking-widest" data-page="setup">
                    <i data-lucide="settings" class="w-5 h-5"></i> Mise en place
                </button>
                <button onclick="loadPage('modeinfluence')" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold uppercase text-xs tracking-widest" data-page="modeinfluence">
                    <i data-lucide="timer-reset" class="w-5 h-5"></i> Tour de jeu
                </button>
                <button onclick="loadPage('endgame')" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold uppercase text-xs tracking-widest" data-page="endgame">
                    <i data-lucide="trophy" class="w-5 h-5"></i> Fin de partie
                </button>
                <button onclick="loadPage('modesolo')" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold uppercase text-xs tracking-widest" data-page="modesolo">
                    <i data-lucide="user" class="w-5 h-5"></i> Mode Solo
                </button>
                <button onclick="loadPage('modeduel')" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold uppercase text-xs tracking-widest" data-page="modeduel">
                    <i data-lucide="swords" class="w-5 h-5"></i> Mode Duel (2J)
                </button>
                <button onclick="loadPage('modecollab')" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold uppercase text-xs tracking-widest" data-page="modecollab">
                    <i data-lucide="handshake" class="w-5 h-5"></i> Mode Collaboration
                </button>
                <button onclick="loadPage('questionnaire')" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold uppercase text-xs tracking-widest" data-page="questionnaire">
                    <i data-lucide="message-circle-question-mark" class="w-5 h-5"></i> Questionnaire
                </button>
                <button onclick="loadPage('media')" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold uppercase text-xs tracking-widest" data-page="media">
                    <i data-lucide="presentation" class="w-5 h-5"></i> Médias & Ressources
                </button>
            </nav>

            <div class="p-10 border-t border-gray-800">
                <p class="text-[10px] text-gray-600 font-black uppercase tracking-widest italic">PROTOTYPE V4</p>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col min-w-0">
            <header class="md:hidden bg-gray-900 text-white p-5 flex justify-between items-center shadow-xl">
                <span class="font-black italic uppercase tracking-tighter">FRA<span class="text-fragile-red">GI</span>LE</span>
                <button onclick="toggleSidebar()" class="p-2 bg-gray-800 rounded-xl">
                    <i data-lucide="menu" id="menuIcon"></i>
                </button>
            </header>
            <div id="content" class="flex-1 overflow-y-auto p-6 md:p-16 lg:p-24 bg-white"></div>
        </main>
    </div>

    <script>
        const galleryImages = [
             { id: 0, title: "Couverture FRAGILE", src: "images/fragile-cover.png", desc: "Couverture FRAGILE" },
            { id: 1, title: "Vue d'ensemble", src: "images/materiel-vue-ensemble.png", desc: "Vue d'ensemble" },
            { id: 2, title: "Plateau central", src: "images/ingame-04.jpg", desc: "Plateau central" },
            { id: 3, title: "Influence des quartiers", src: "images/ingame-03.jpg", desc: "Influence des quartiers" },
            { id: 4, title: "Colis dans l'entrepôt", src: "images/ingame-02.jpg", desc: "Colis dans l'entrepôt" },
            { id: 5, title: "Matériel: les cubes", src: "images/materiel-cubes.png", desc: "Matériel: les cubes" },
            { id: 6, title: "Matériel: les cartes", src: "images/materiel-cartes.png", desc: "Matériel: les cartes" },
            { id: 7, title: "Matériel: les jetons et dés", src: "images/materiel-jetons.png", desc: "Matériel: les jetons et dés" }

        ];

        let currentGalleryIndex = 0;
        let currentMaterielTab = 'overview';

        function loadPage(pageId) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            container.className = "flex-1 overflow-y-auto p-6 md:p-16 lg:p-24 bg-white animate-fade-in";
            
            document.querySelectorAll('.nav-item').forEach(btn => {
                if(btn.dataset.page === pageId) {
                    btn.classList.add('bg-fragile-red', 'text-white', 'shadow-lg');
                } else {
                    btn.classList.remove('bg-fragile-red', 'text-white', 'shadow-lg');
                    btn.classList.add('text-gray-400', 'hover:bg-gray-800');
                }
            });

            switch(pageId) {
                case 'intro': renderIntro(container); break;
                case 'materiel': renderMateriel(container); break;
                case 'setup': renderSetup(container); break;
                case 'modeinfluence': renderModeInfluence(container); break;
                case 'endgame': renderEndGame(container); break;
                case 'modesolo': renderModeSolo(container); break;
                case 'modeduel': renderModeDuel(container); break;
                case 'modecollab': renderModeCollab(container); break;
                case 'questionnaire': renderQuestionnaire(container); break;
                case 'media': renderGalerie(container); break;
            }

            if(window.innerWidth < 768) toggleSidebar(false);
            lucide.createIcons();
            window.scrollTo(0, 0);
        }

        function renderIntro(container) {
            let grid = galleryImages.map((img, idx) => `
                <div onclick="openGallery(${idx})" class="aspect-square bg-gray-100 rounded-[2rem] border-4 border-white shadow-sm hover:shadow-xl hover:scale-[1.03] transition-all cursor-zoom-in overflow-hidden relative group">
                    <img src="${img.src}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                    <div class="hidden absolute inset-0 flex flex-col items-center justify-center bg-gray-50 text-gray-400 p-4 text-center">
                        <i data-lucide="image" class="w-8 h-8 mb-2"></i>
                        <span class="text-[9px] font-black uppercase">${img.title}</span>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="space-y-10">
                    <div class="flex items-center gap-6 border-b-8 border-fragile-red pb-6">
                        <div class="bg-fragile-red text-white p-4 rounded-3xl shadow-lg rotate-3"><i data-lucide="truck" class="w-12 h-12"></i></div>
                        <h2 class="text-5xl font-black uppercase italic tracking-tighter">Bienvenue dans Fragile</h2>
                    </div>

                    <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-gray-100">
                        <div class="space-y-4 text-lg text-gray-700 leading-relaxed italic border-l-8 border-fragile-red pl-8">
                            <p>Plongez dans un entrepôt en plein rush avec <span class='text-fragile-red font-bold'>FRAGILE</span>, un jeu de gestion et d'optimisation où
chaque décision se répercute sur votre trésorerie.</p>
                        </div>
                        <p class="mt-10 font-medium text-gray-600 leading-relaxed">
                            En tant que chef d'entreprise, vous devrez jongler entre l'acquisition de lots de <span class='text-fragile-red font-bold'>marchandises</span>,
l'organisation millimétrée de votre <span class='text-fragile-red font-bold'>entrepôt</span> et l'urgence des <span class='text-fragile-red font-bold'>livraisons</span>.<br>Mais dans ce métier, l'équilibre est précaire : entre les <span class='text-fragile-red font-bold'>contraintes</span> strictes des produits sensibles, les
<span class='text-fragile-red font-bold'>exigences</span> des différents quartiers de la ville et les <span class='text-fragile-red font-bold'>imprévus</span> qui menancent votre activité, la moindre erreur peut <span class='text-fragile-red font-bold'>fragiliser</span> votre bilan financier.
                        </p>
                        <p class="mt-10 font-medium text-gray-600 leading-relaxed">
                            Saurez-vous dompter vos dettes et surmonter les crises pour bâtir la société de transport la plus
prospère?<br>Dans ce <span class='text-fragile-red font-bold'>défi stratégique</span>, la victoire appartient au gestionnaire le plus rigoureux, celui qui saura
transformer la contrainte en opportunité. 
                        </p>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">${grid}</div>
                </div>
            `;
        }

        function renderMateriel(container) {
            container.innerHTML = `
                <div class="space-y-10">
                    <div class="flex items-center gap-6 border-b-8 border-fragile-red pb-6">
                        <div class="bg-fragile-red text-white p-4 rounded-3xl shadow-lg rotate-3"><i data-lucide="settings" class="w-12 h-12"></i></div>
                        <h2 class="text-5xl font-black uppercase italic tracking-tighter">Matériel</h2>
                    </div>
                    
                    <!-- Navigation Mobile (Liste déroulante) -->
                    <div class="md:hidden sticky top-0 bg-white z-20 pb-4 border-b border-gray-100">
                        <label for="materiel-select" class="block text-[10px] font-black uppercase text-gray-400 mb-2 tracking-widest">Catégorie de matériel</label>
                        <div class="relative">
                            <select id="materiel-select" onchange="switchTab(this.value)" class="w-full bg-gray-50 border-2 border-gray-200 rounded-xl px-4 py-3 font-bold text-gray-900 appearance-none focus:border-fragile-red outline-none transition-colors">
                                <option value="overview">Vue d'ensemble</option>
                                <option value="warehouse">Entrepôt</option>
                                <option value="city">Ville</option>
                                <option value="orders">Commandes</option>
                                <option value="trucks">Camions</option>
                                <option value="bank">Banque</option>
                            </select>
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                                <i data-lucide="chevron-down" class="w-5 h-5"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Navigation Desktop (Onglets classiques) -->
                    <div class="hidden md:flex overflow-x-auto no-scrollbar border-b border-gray-200 sticky top-0 bg-white z-20">
                        <button onclick="switchTab('overview')" id="tab-overview" class="tab-btn shrink-0 px-6 py-4 font-black uppercase text-xs tracking-widest text-gray-400 transition-all">Vue d'ensemble</button>
                        <button onclick="switchTab('warehouse')" id="tab-warehouse" class="tab-btn shrink-0 px-6 py-4 font-black uppercase text-xs tracking-widest text-gray-400 transition-all">Entrepôt</button>
                        <button onclick="switchTab('city')" id="tab-city" class="tab-btn shrink-0 px-6 py-4 font-black uppercase text-xs tracking-widest text-gray-400 transition-all">Ville</button>
                        <button onclick="switchTab('orders')" id="tab-orders" class="tab-btn shrink-0 px-6 py-4 font-black uppercase text-xs tracking-widest text-gray-400 transition-all">Commandes</button>
                        <button onclick="switchTab('trucks')" id="tab-trucks" class="tab-btn shrink-0 px-6 py-4 font-black uppercase text-xs tracking-widest text-gray-400 transition-all">Camions</button>
                        <button onclick="switchTab('bank')" id="tab-bank" class="tab-btn shrink-0 px-6 py-4 font-black uppercase text-xs tracking-widest text-gray-400 transition-all">Banque</button>
                    </div>

                    <!-- Conteneur de l'onglet -->
                    <div id="tab-content" class="py-6 min-h-[400px]">
                        <!-- Le contenu sera injecté ici par switchTab -->
                    </div>
                </div>
            `;
            // Activer l'onglet par défaut (synchronise select et tabs)
            switchTab(currentMaterielTab);
        }

        function switchTab(tabId) {
            currentMaterielTab = tabId;
            const content = document.getElementById('tab-content');
            
            // Mise à jour de l'UI des onglets Desktop
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            const activeTab = document.getElementById(`tab-${tabId}`);
            if (activeTab) activeTab.classList.add('tab-active');

            // Mise à jour de la liste déroulante Mobile
            const select = document.getElementById('materiel-select');
            if (select) select.value = tabId;

            content.innerHTML = '<div class="flex justify-center py-20 animate-pulse text-gray-300"><i data-lucide="loader" class="w-10 h-10"></i></div>';
            lucide.createIcons();

            setTimeout(() => {
                content.innerHTML = '';
                switch(tabId) {
                    case 'overview': renderOverviewTab(content); break;
                    case 'warehouse': renderWarehouseTab(content); break;
                    case 'city': renderCityTab(content); break;
                    case 'orders': renderOrdersTab(content); break;
                    case 'bank': renderBankTab(content); break;
                    case 'trucks': renderTrucksTab(content); break;
                }
                lucide.createIcons();
            }, 50); // Délai réduit pour plus de réactivité
        }

        // --- CONTENU DES ONGLETS ---

        function renderOverviewTab(container) {
            container.innerHTML = `
                <div class="space-y-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${renderMaterialCard("Monnaie (Péz)", ["16 pièces de 10 Péz", "24 pièces de 5 Péz", "36 pièces de 3 Péz", "48 pièces de 1 Péz"], "images/materiel/monnaie.png")}
                        ${renderMaterialCard("Ressources", ["12 cubes 'Volant'", "12 cubes 'Scanneur'", "12 cubes 'Bidon Essence'", "10 cubes 'Banque'"], "images/ressources.jpg")}
                        ${renderMaterialCard("Joueurs", ["10 cubes 'Joueur 1'", "10 cubes 'Joueur 2'", "10 cubes 'Joueur 3'", "10 cubes 'Joueur 4'"], "images/composants.jpg")}
                        ${renderMaterialCard("Evènements", ["12 plaques 'Flamme'", "12 plaques 'Flash'", "12 plaques 'Chantier'"], "images/composants.jpg")}
                        ${renderMaterialCard("Colis", ["20 colis 'Surgelés' (bleu)", "20 colis 'Dangereux' (rouge)", "20 colis 'Hygiène' (vert)", "20 colis 'Restauration' (rose)", "20 colis 'Vêtements' (jaune)", "4 cubes 'Sécurité'"], "images/materiel/colis.png")}
                        ${renderMaterialCard("Cartes", ["8 cartes 'Banque'", "30 cartes 'Commande 1 Colis'", "30 cartes 'Commande 2 Colis'", "4 cartes 'Camion Bleu'", "4 cartes 'Camion Blanc'"], "images/materiel/cartes.png")}
                        ${renderMaterialCard("Dés", ["2 dés 'Evènements'", "1 dé 'Prix Essence'"], "images/materiel/colis.png")}
                        ${renderMaterialCard("Plateaux", ["1 roue 'Etapes'", "4 plateaux 'Entrepôt'", "1 plateau 'Ville'", "1 panneau 'Influence et Tarifs'"], "images/composants.jpg")}
                        ${renderMaterialCard("Autres", ["1 carnet 'Score'", "1 cube 'Premier Joueur'", "1 sac pour les colis"], "images/composants.jpg")}
                    </div>
                </div>
            `;
        }

        function renderWarehouseTab(container) {
            container.innerHTML = `
                <div class="space-y-10">
                    <div class="flex justify-left items-center">
                        <img src="images/materiel/entrepot.png" class="max-w-full h-auto block" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="hidden aspect-video flex flex-col items-center justify-center text-gray-300 p-20 w-full">
                            <i data-lucide="map" class="w-16 h-16 mb-2"></i>
                            <span class="font-black uppercase italic text-center text-sm">[Image : Plateau 'Entrepôt']</span>
                        </div>
                    </div>

                    <div class="space-y-2">
                        ${renderSetupDetail(1, "", "Quai de chargement pour camion bleu")}
                        ${renderSetupDetail(2, "", "Quai de chargement pour camion blanc")}
                        ${renderSetupDetail(3, "", "Zone réfrigérée pour stockage des colis bleus")}
                        ${renderSetupDetail(4, "", "Zone de stockage des colis rouges, roses, jaunes et verts")}
                        ${renderSetupDetail(5, "", "Zone de stockage des cubes '<span class='text-fragile-red font-bold'>Scanneur</span>'")}
                        ${renderSetupDetail(6, "", "Zone de stockage des cubes '<span class='text-fragile-red font-bold'>Bidon Essence</span>'")}
                        ${renderSetupDetail(7, "", "Emplacements pour cartes '<span class='text-fragile-red font-bold'>Commande</span>'")}
                        ${renderSetupDetail(8, "", "Emplacement pour cartes '<span class='text-fragile-red font-bold'>Commande</span>' annulées")}
                        ${renderSetupDetail(9, "", "Marque du nombre de livraisons")}
                    </div>
                </div>
            `;
        }

        function renderCityTab(container) {
            container.innerHTML = `
                <div class="space-y-10">
                    <div class="flex justify-left items-center">
                        <img src="images/materiel/ville.png" class="max-w-full h-auto block" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="hidden aspect-video flex flex-col items-center justify-center text-gray-300 p-20 w-full">
                            <i data-lucide="map" class="w-16 h-16 mb-2"></i>
                            <span class="font-black uppercase italic text-center text-sm">[Image : Plateau 'Ville']</span>
                        </div>
                    </div>

                    <div class="space-y-2">
                        ${renderSetupDetail(1, "", "Quartier '<span class='text-fragile-red font-bold'>Zone Résidentielle</span>' avec 9 marqueurs d'influence")}
                        ${renderSetupDetail(2, "", "Quartier '<span class='text-fragile-red font-bold'>Centre Ville</span>' avec 9 marqueurs d'influence")}
                        ${renderSetupDetail(3, "", "Quartier '<span class='text-fragile-red font-bold'>Centre Commercial</span>' avec 9 marqueurs d'influence")}
                        ${renderSetupDetail(4, "", "Quartier '<span class='text-fragile-red font-bold'>Zone Industrielle</span>' avec 9 marqueurs d'influence")}
                        ${renderSetupDetail(5, "", "Bâtiment '<span class='text-fragile-red font-bold'>Grossiste</span>' avec 4 palettes de 4 emplacements")}
                        ${renderSetupDetail(6, "", "Emplacement pour le dé '<span class='text-fragile-red font-bold'>Prix Essence</span>'")}
                        ${renderSetupDetail(7, "", "Bâtiment '<span class='text-fragile-red font-bold'>Banque</span>' avec 2 emplacements pour cartes")} 
                    </div>

                    <p class="mt-10 text-sm text-gray-600 leading-relaxed">
                        A 2 joueurs on ne joue que les zones bordées de bleu = 2 palettes chez le grossiste et 5 marqueurs d'influence par quartier.<br>

                        { type: 'info', text: "Mais les gains de cette livraison seront limités. Il faut donc l'utiliser uniquement comme une action de déblocage.<br>Lorsque la commande est livrée, le cube '<span class='text-fragile-red font-bold'>Sécurité</span>' est défaussé et ne peut plus être utilisé (il faudra en acheter un autre si nécessaire)." },
                        { type: 'p', text: "Le chargement du ou des colis dans un camion n'est possible que si le joueur possède en stock un cube '<span class='text-fragile-red font-bold'>Scanneur</span>': il faut 1 cube pour chaque carte commande chargée." },
                        { type: 'p', text: "Lorsqu'une commande est chargée:" },
                        { type: 'list', items: [
                            "Le joueur est défaussé d'un cube '<span class='text-fragile-red font-bold'>Scanneur</span>' qui est mis dans la réserver.",
                            "Dans la zone de l'entrepôt, la carte commande est déplacée vers le haut pour afficher l'icône '<span class='text-fragile-red font-bold'>Validée</span>' <i data-lucide='circle-check' class='inline-block w-5 h-5'></i>"
                        ]},
                        { type: 'image', src: "images/rules/step4-figure2.png"},
                        { type: 'p', text: "Puis c'est au tour du joueur suivant (dans le sens des aiguilles d'une montre).<br>Lorsque le dernier joueur a effectué son tour, on passe à l'étape suivante." }
                    ]
                },
                {
                    id: 5, 
                    t: "Livraison / Retour Camion", 
                    content: [
                        { type: 'p', text: "Cette étape est facultative." },
                        { type: 'p', text: "Si un camion était en livraison (voir ci-dessous), alors la carte est retournée et le camion est de nouveau disponible." },
                        { type: 'image', src: "images/rules/step5-figure1.png"},
                        { type: 'list', items: [
                            { text: "Une livraison est possible si:", subItems: [
                                "3 colis ont été chargés sur le camion.",
                                "1 cube '<span class='text-fragile-red font-bold'>Volant</span>' est positionné sur le camion.",
                                "1 cube '<span class='text-fragile-red font-bold'>Bidon Essence</span>' est disponible dans l'entrepôt."
                            ]},
                        ]},
                        { type: 'info', text: "Il n'est pas possible de déplacer un cube '<span class='text-fragile-red font-bold'>Volant</span>' d'un camion vers un autre." },
                        { type: 'p', text: "Une livraison est complétée avec les actions suivantes:" },
                        { type: 'p', text: "<div class='conteneur'><div class='cercle'>1</div><span>Le joueur est défaussé du cube '<span class='text-fragile-red font-bold'>Volant</span>' et d'un cube '<span class='text-fragile-red font-bold'>Bidon Essence</span>' qui sont mis dans la réserve.</span></div>" },
                        { type: 'p', text: "<div class='conteneur'><div class='cercle'>2</div><span>Le joueur reçoit en Péz la somme des gains des cartes correspondant aux colis chargés sur le camion.</span></div>" },
                        { type: 'p', text: "<div class='conteneur'><div class='cercle'>3</div><span>Ces cartes sont sorties de la zone de l'entrepôt et poser hors de la zone de jeu.</span></div>" },
                        { type: 'p', text: "<div class='conteneur'><div class='cercle'>4</div><span>Le joueur peut alors poser un ou plusieurs cubes '<span class='text-fragile-red font-bold'>Joueur</span>' de sa couleur pour marquer son influence dans un quartier de la ville en fonction des colis qui composent la commande livrée.</span></div>" },
                        { type: 'list', items: [
                            { text: "Zone Résidentielle:", subItems: [
                                "<span class='italic'>Condition d'accès</span> = Aucune",
                                "<span class='italic'>Influence</span> = 1 cube qu'elle que soit la livraison",
                                "<span class='italic'>Bonus immédiat</span> = 1 cube '<span class='text-fragile-red font-bold'>Bidon Essence</span>'.",
                                "<span class='italic'>Gain fin de partie</span> = <b>10 Péz</b> pour le 1er rang et <b>5 Péz</b> pour le 2ème rang."
                            ]},
                        ]}, 
                        { type: 'list', items: [
                            { text: "Centre Ville:", subItems: [
                                "<span class='italic'>Condition d'accès</span> = Au moins 1 colis jaune OU au moins 1 colis rose",
                                "<span class='italic'>Influence</span> = 1 ou 2 colis requis = 1 cube OU 3 colis requis = 2 cubes",
                                "<span class='italic'>Bonus immédiat</span> = Aucun.",
                                "<span class='italic'>Gain fin de partie</span> = <b>15 Péz</b> pour le 1er rang et <b>8 Péz</b> pour le 2ème rang."
                            ]},
                        ]},                
                        { type: 'list', items: [
                            { text: "Centre Commercial:", subItems: [
                                "<span class='italic'>Condition d'accès</span> = Au moins 1 colis vert OU 3 colis bleus",
                                "<span class='italic'>Influence</span> = 1, 2 ou 3 colis verts = 1 cube OU 3 colis bleus = 2 cubes",
                                "<span class='italic'>Bonus immédiat</span> = Aucun.",
                                "<span class='italic'>Gain fin de partie</span> = <b>20 Péz</b> pour le 1er rang et <b>10 Péz</b> pour le 2ème rang."
                            ]},
                        ]},                
                        { type: 'list', items: [
                            { text: "Zone Industrielle:", subItems: [
                                "<span class='italic'>Condition d'accès</span> = Au moins 1 colis rouge",
                                "<span class='italic'>Influence</span> = 1 colis rouge = 1 cube OU 3 colis rouges = 2 cubes",
                                "<span class='italic'>Bonus immédiat</span> = Aucun.",
                                "<span class='italic'>Gain fin de partie</span> = <b>25 Péz</b> pour le 1er rang et <b>15 Péz</b> pour le 2ème rang."
                            ]},
                        ]},             
                        { type: 'p', text: "<div class='conteneur'><div class='cercle'>5</div><span>Puis les colis chargés sur le camion sont remis dans le sac des colis.</span></div>" },
                        { type: 'p', text: "<div class='conteneur'><div class='cercle'>6</div><span>La carte du camion est retournée pour symboliser qu'il est en livraison et il ne sera pas disponible pour la prochaine étape de chargement.</span></div>" },
                        { type: 'p', text: "<div class='conteneur'><div class='cercle'>7</div><span>Le cube 'Camion' du joueur est avancé d'une case sur le marqueur de score de son entrepôt.</span></div>" },
                        { type: 'p', text: "Le joueur qui possède le cube 'Premier Joueur' effectue ses livraisons (si disponibles)." },
                        { type: 'p', text: "Puis c'est au tour du joueur suivant (dans le sens des aiguilles d'une montre)." },
                        { type: 'p', text: "Lorsque le " },
                      ]
                },
                {
                    id: 6, 
                    t: "Evènements Aléatoires", 
                    content: [
                        { type: 'p', text: "Le tour se termine par une phase administrative obligatoire." },
                        { type: 'list', items: [
                            "Frais de stockage : payez 1 Péz par lot non livré resté dans votre entrepôt.",
                            "Récupérez tous vos cubes de ressources utilisés.",
                            "Piochez une carte Évènement et appliquez ses effets immédiatement ou pour le tour suivant selon le texte."
                        ]}
                    ]
                }
            ];

            let cards = phases.map(p => {
                const contentHtml = p.content.map(block => {
                    if (block.type === 'p') {
                        return `<p class="text-gray-700 font-medium leading-relaxed">${block.text}</p>`;
                    } else if (block.type === 'list') {
                        return `
                            <ul class="list-disc ml-6 space-y-3 text-gray-700 font-medium">
                                ${block.items.map(li => {
                                    if (typeof li === 'object') {
                                        return `
                                            <li>
                                                <span class="font-medium text-gray-700">${li.text}</span>
                                                <ul class="list-[circle] ml-6 mt-2 space-y-1 text-gray-700 font-medium">
                                                    ${li.subItems.map(sub => `<li>${sub}</li>`).join('')}
                                                </ul>
                                            </li>`;
                                    }
                                    return `<li>${li}</li>`;
                                }).join('')}
                            </ul>
                        `;
                    } else if (block.type === 'image') {
                        return `
                            <div class="flex justify-left  overflow-hidden my-4">
                                <img src="${block.src}" alt="Illustration" class="max-w-full h-auto block select-none" onerror="this.parentElement.style.display='none'">
                            </div>  
                        `;
                    } else if (block.type === 'info') {
                        return `
                            <div class="bg-red-100 p-4 rounded-2xl border border-red-100">
                                <p>${block.text}</p>
                                ${block.image ? `
                                    <div class="mt-2">
                                        <img src="${block.image}" alt="Illustration" class="max-w-full h-auto block select-none" onerror="this.style.display='none'">
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }
                    return '';
                }).join('');

                return `
                    <div class="bg-white border-2 border-gray-200 rounded-3xl overflow-hidden hover:border-fragile-red transition-all shadow-sm">
                        <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="w-full p-6 flex items-center gap-6 text-left">
                            <div class="w-12 h-12 bg-fragile-red text-white font-black rounded-2xl flex items-center justify-center text-xl">${p.id}</div>
                            <span class="font-black uppercase tracking-tight text-lg flex-1">${p.t}</span>
                            <i data-lucide="chevron-down" class="text-gray-300"></i>
                        </button>
                        <div class="hidden p-8 border-t bg-gray-50 space-y-6">
                            <div class="space-y-4">
                                ${contentHtml}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="space-y-10">
                    <div class="flex items-center gap-6 border-b-8 border-fragile-red pb-6">
                        <div class="bg-fragile-red text-white p-4 rounded-3xl shadow-lg rotate-3"><i data-lucide="timer-reset" class="w-12 h-12"></i></div>
                        <h2 class="text-5xl font-black uppercase italic tracking-tighter">Tour de jeu</h2>
                    </div>
                    <div class="grid gap-4">${cards}</div>
                </div>
            `;
        }

        function renderModeCollab(container) {
            container.innerHTML = `
                <div class="space-y-10">
                    <div class="flex items-center gap-6 border-b-8 border-fragile-red pb-6">
                        <div class="bg-fragile-red text-white p-4 rounded-3xl shadow-lg rotate-3"><i data-lucide="handshake" class="w-12 h-12"></i></div>
                        <h2 class="text-5xl font-black uppercase italic tracking-tighter">Mode Collaboration</h2>
                    </div>
                    <div class="bg-gray-900 text-white p-8 rounded-[3rem] border-4 border-white italic">
                        <p class="text-xl">"Un affrontement frontal inspiré du FIJ Cannes 2026."</p>
                    </div>
                    <div class="p-10 bg-white rounded-3xl border-2 border-gray-100 shadow-xl space-y-4">
                        <h3 class="text-2xl font-black uppercase italic">Éviction Logistique</h3>
                        <p class="text-gray-700 leading-relaxed">Au lieu d'ajouter un cube, vous pouvez retirer un cube adverse pour 1 cube Scanneur supplémentaire.</p>
                    </div>
                </div>`;
        }

        function renderEndGame(container) {
            container.innerHTML = `
                <div class="space-y-10">
                    <div class="flex items-center gap-6 border-b-8 border-fragile-red pb-6">
                        <div class="bg-fragile-red text-white p-4 rounded-3xl shadow-lg rotate-3"><i data-lucide="trophy" class="w-12 h-12"></i></div>
                        <h2 class="text-5xl font-black uppercase italic tracking-tighter">Fin de Partie</h2>
                    </div>
                <div class="bg-gray-900 text-white p-12 rounded-[4rem]">Score = Trésorerie - Dettes.</div>
            </div>`;
        }

        function renderQuestionnaire(container) {
            container.innerHTML = `
                <div class="space-y-10">
                    <div class="flex items-center gap-6 border-b-8 border-fragile-red pb-6">
                        <div class="bg-fragile-red text-white p-4 rounded-3xl shadow-lg rotate-3"><i data-lucide="message-circle-question-mark" class="w-12 h-12"></i></div>
                        <h2 class="text-5xl font-black uppercase italic tracking-tighter">Questionnaire</h2>
                    </div>
                <div class="bg-white p-12 rounded-[3.5rem] border-4 border-gray-900 shadow-2xl">
                <p class="text-xl text-gray-700 mb-10">Aidez-nous à améliorer le jeu en répondant au questionnaire.</p>
                <a href="https://forms.gle/jEaXDQ75byHyzq18" target="_blank" class="inline-flex items-center gap-4 bg-fragile-red text-white px-12 py-6 rounded-3xl font-black uppercase italic shadow-xl">Accéder au formulaire <i data-lucide="external-link"></i></a>
            </div></div>`;
        }

        // --- HELPERS ---
        function renderMaterialCard(title, items, imgSrc) {
            return `<div class="bg-white p-8 rounded-[2.5rem] border-2 border-gray-100 shadow-sm group">
                <div class="h-40 bg-gray-50 rounded-2xl mb-6 flex items-center justify-center overflow-hidden border-4 border-white shadow-inner" onclick="openZoom('${imgSrc}', '${title}')">
                    <img src="${imgSrc}" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                    <span class="hidden p-6 text-gray-400 text-xs italic text-center">[Image : ${title}]</span>
                </div>
                <h4 class="font-black text-gray-900 text-sm uppercase mb-4 tracking-tighter">${title}</h4>
                <ul class="space-y-2">${items.map(i => `<li class="text-xs text-gray-500 font-bold flex items-center gap-3"><div class="w-1.5 h-1.5 rounded-full bg-fragile-red"></div> ${i}</li>`).join('')}</ul>
            </div>`;
        }

        function renderSetupDetail(num, title, desc) {
            return `<div class="flex gap-6 p-4 bg-white items-start"><div class="w-7 h-7 bg-fragile-red text-white rounded-full flex items-center justify-center text-sm font-black shrink-0">${num}</div><div><h3 class="font-black text-gray-900 text-lg uppercase mb-1 italic tracking-tight">${title}</h3><p class="text-gray-600 text-sm leading-relaxed">${desc}</p></div></div>`;
        }

        function renderRuleBlock(title, text) {
            return `<div class="p-6 bg-white rounded-2xl border-2 border-gray-100 shadow-sm"><h5 class="font-black text-gray-900 text-sm mb-2 uppercase tracking-tight flex items-center gap-2"><div class="w-1 h-4 bg-fragile-red"></div> ${title}</h5><p class="text-gray-500 text-sm leading-relaxed font-medium">${text}</p></div>`;
        }

        function renderScoreLine(label, sub, val, color) {
            return `<div class="flex justify-between items-center group bg-white/5 p-4 rounded-xl"><div><span class="block font-black uppercase text-sm tracking-widest">${label}</span><span class="text-[10px] text-gray-500 italic uppercase font-bold">${sub}</span></div><div class="text-2xl font-mono font-black ${color}">${val}</div></div>`;
        }

        function openGallery(index) {
            currentGalleryIndex = index;
            const img = galleryImages[index];
            updateModal(img.src, img.desc, img.title, true);
            document.getElementById('imageModal').classList.remove('hidden');
            document.getElementById('imageModal').classList.add('flex');
        }

        function openZoom(src, title) {
            updateModal(src, "", title, false);
            document.getElementById('imageModal').classList.remove('hidden');
            document.getElementById('imageModal').classList.add('flex');
        }

        function updateModal(src, desc, title, isGallery) {
            const img = document.getElementById('modalImg');
            const placeholder = document.getElementById('modalPlaceholder');
            img.src = src;
            img.style.display = 'block';
            placeholder.classList.add('hidden');
            document.getElementById('modalTitle').textContent = title || "Vue détaillée";
            img.onerror = () => { img.style.display = 'none'; placeholder.classList.remove('hidden'); };
            if(isGallery) {
                document.getElementById('prevBtn').classList.remove('hidden');
                document.getElementById('nextBtn').classList.remove('hidden');
                document.getElementById('galleryCounter').classList.remove('hidden');
                document.getElementById('galleryCounter').textContent = `${currentGalleryIndex + 1} / ${galleryImages.length}`;
            } else {
                document.getElementById('prevBtn').classList.add('hidden');
                document.getElementById('nextBtn').classList.add('hidden');
                document.getElementById('galleryCounter').classList.add('hidden');
            }
        }

        function navigateGallery(dir) {
            currentGalleryIndex += dir;
            if(currentGalleryIndex < 0) currentGalleryIndex = galleryImages.length - 1;
            if(currentGalleryIndex >= galleryImages.length) currentGalleryIndex = 0;
            openGallery(currentGalleryIndex);
        }

        function closeModal() {
            document.getElementById('imageModal').classList.add('hidden');
            document.getElementById('imageModal').classList.remove('flex');
        }

        function toggleSidebar(force) {
            const sidebar = document.getElementById('sidebar');
            if(force === false || sidebar.classList.contains('translate-x-0')) {
                sidebar.classList.add('-translate-x-full');
                sidebar.classList.remove('translate-x-0');
            } else {
                sidebar.classList.remove('-translate-x-full');
                sidebar.classList.add('translate-x-0');
            }
        }

        window.onload = () => { loadPage('intro'); lucide.createIcons(); };
    </script>
</body>
</html>
